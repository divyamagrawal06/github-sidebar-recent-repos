<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recent repos</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-root">
      <div class="Box">
        <div class="Box-header">
          <h2 class="Box-title">Recent repositories</h2>
          <p class="Box-description">How many entries to show in the GitHub sidebar (most recent first).</p>
        </div>
        <div class="Box-body">
          <label class="FormLabel" for="display-count">Show up to</label>
          <div class="FormControl-inline">
            <input
              id="display-count"
              class="FormControl-input"
              type="number"
              min="1"
              max="50"
              step="1"
              inputmode="numeric"
              autocomplete="off"
            />
            <span class="FormControl-suffix" aria-hidden="true">repos</span>
          </div>
          <p id="status" class="FormControl-hint" role="status" aria-live="polite"></p>
        </div>
        <div class="Box-footer">
          <a
            class="github-star-btn js-toggler-target btn-sm BtnGroup-item"
            id="star-repo"
            href="https://github.com/divyamagrawal06/github-sidebar-recent-repos"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Star this repository"
            role="button"
          >
            <svg
              aria-hidden="true"
              height="16"
              viewBox="0 0 16 16"
              width="16"
              class="octicon octicon-star d-inline-block github-star-octicon"
              fill="currentColor"
            >
              <path
                d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Zm0 2.445L6.615 5.5a.75.75 0 0 1-.564.41l-3.097.45 2.24 2.184a.75.75 0 0 1 .216.664l-.528 3.084 2.769-1.456a.75.75 0 0 1 .698 0l2.77 1.456-.53-3.084a.75.75 0 0 1 .216-.664l2.24-2.183-3.096-.45a.75.75 0 0 1-.564-.41L8 2.694Z"
              />
            </svg>
            <span class="d-inline">Star</span>
          </a>
          <button type="button" id="save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
